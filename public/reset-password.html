<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stick A Pin</title>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/image/donezo-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
  </head>
  <body class="cork-page reset-password-page">
    <main id="reset-password-page" class="sticky-note thumbtack">
      <div class="paper-content">
        <div class="paper-header">
          <h1>Reset Password</h1>
          <p>Create a new password for your account.</p>
        </div>

        <form id="resetPasswordForm" class="paper-form">
          <div class="paper-field">
            <label for="resetPasswordEmail">Email</label>
            <input id="resetPasswordEmail" type="email" name="email" required />
          </div>
          <div class="paper-field">
            <label for="resetPasswordNew">New Password</label>
            <input id="resetPasswordNew" type="password" name="newPassword" required />
          </div>
          <aside class="password-criteria-note" aria-label="Password requirements">
            <p class="password-criteria-title">Password must include:</p>
            <ul>
              <li>At least 12 characters</li>
              <li>One uppercase letter</li>
              <li>One lowercase letter</li>
              <li>One number</li>
            </ul>
          </aside>
          <div class="paper-field">
            <label for="resetPasswordConfirm">Confirm Password</label>
            <input id="resetPasswordConfirm" type="password" name="confirmPassword" required />
          </div>
          <button class="paper-button" type="submit">Save New Password</button>
        </form>

        <p class="paper-footer"><a href="/login.html">Back to login</a></p>
      </div>
    </main>
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
