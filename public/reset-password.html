<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stick A Pin</title>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/image/donezo-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
  </head>
  <body class="cork-page reset-password-page">
    <main id="reset-password-page" class="sticky-note thumbtack">
      <div class="paper-content">
        <div class="paper-header">
          <h1>Reset Password</h1>
          <p>Create a new password for your account.</p>
        </div>

        <form id="resetPasswordForm" class="paper-form">
          <div class="paper-field">
            <label for="resetPasswordEmail">Email</label>
            <input id="resetPasswordEmail" type="email" name="email" required />
          </div>
          <div class="paper-field">
            <label for="resetPasswordNew">New Password</label>
            <input id="resetPasswordNew" type="password" name="newPassword" required />
          </div>
          <aside
            id="resetPasswordCriteria"
            class="sticky-note pink thumbtack password-criteria-note"
            aria-label="Password requirements"
          >
            <p class="password-criteria-title">Password must include:</p>
            <ul class="big-three-list password-criteria-list">
              <li class="big-three-item">
                <input class="task-check big-three-check password-criteria-check" type="checkbox" data-rule="length" disabled />
                <span>At least 12 characters</span>
              </li>
              <li class="big-three-item">
                <input class="task-check big-three-check password-criteria-check" type="checkbox" data-rule="uppercase" disabled />
                <span>One uppercase letter</span>
              </li>
              <li class="big-three-item">
                <input class="task-check big-three-check password-criteria-check" type="checkbox" data-rule="lowercase" disabled />
                <span>One lowercase letter</span>
              </li>
              <li class="big-three-item">
                <input class="task-check big-three-check password-criteria-check" type="checkbox" data-rule="number" disabled />
                <span>One number</span>
              </li>
            </ul>
          </aside>
          <div class="paper-field">
            <label for="resetPasswordConfirm">Confirm Password</label>
            <input id="resetPasswordConfirm" type="password" name="confirmPassword" required />
          </div>
          <button class="paper-button" type="submit">Save New Password</button>
        </form>

        <p class="paper-footer"><a href="/login.html">Back to login</a></p>
      </div>
    </main>
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>

    <div
      id="toast"
      class="toast toast--default"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    >
      <div class="toast__icon" aria-hidden="true">i</div>
      <div class="toast__content">
        <div id="toastTitle" class="toast__title" hidden></div>
        <div id="toastMessage" class="toast__message"></div>
      </div>
      <button
        id="toastClose"
        class="toast__close"
        type="button"
        aria-label="Close notification"
      >
        ×
      </button>
      <div class="toast__progress"></div>
    </div>
  </body>
</html>
