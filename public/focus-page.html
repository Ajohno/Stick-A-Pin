<!doctype html>
<html lang="en">
  <head>
    <title>Stick A Pin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/image/donezo-logo.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/focus-page.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Itim&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button
          class="nav__toggle"
          type="button"
          aria-label="Open menu"
          aria-controls="nav-drawer"
          aria-expanded="false"
        >
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
          <span class="sr-only">Menu</span>
        </button>
        <a href="/dashboard.html" class="logo-container brand-link" aria-label="Go to dashboard">
          <div class="logo-sticky">
            <div class="thumbtack">
              <i class="fa-solid fa-thumbtack" style="color: #c6534e"></i>
            </div>
          </div>
          <span class="brand-name">Stick A Pin</span>
        </a>
      </div>
      <ul class="nav-links" id="nav-drawer">
        <li><a href="/dashboard.html" class="nav-item">Board</a></li>
        <li><a href="/calendar-page.html" class="nav-item">Calendar</a></li>
        <li>
          <a href="/feedback-page.html" class="nav-item">Feedback</a>
        </li>
        <li><a href="/settings-page.html" class="nav-item">Settings</a></li>
        <li><a href="#" id="logoutBtn" class="nav-item">Logout</a></li>
      </ul>
      <div class="nav-right">
        <div class="nav-status">
          <div class="nav-tasks">
            <span class="tasks-count item-counter"></span>
            <span class="tasks-label-text">Tasks Left</span>
          </div>
          <span id="authStatus" class="nav-welcome"></span>
        </div>
        <a
            href="/profile-page.html"
            class="nav-profile-button sticky-note thumbtack"
            aria-label="Open profile"
          >
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <span class="sr-only">Profile</span>
          </a>
      </div>
    </nav>
    <div id="nav-backdrop" aria-hidden="true"></div>

    <main class="corkboard" style="max-width: 1200px; margin: 0 auto">
      <section
        id="focus-mode-widget"
        class="focus-board"
        aria-label="Focus mode board"
      >
        <div class="focus-column focus-column-left">
          <article class="sticky-note yellow tape focus-card focus-log-card">
            <h2 class="focus-log-title">Focus Log</h2>
            <div id="focus-log-body" class="focus-log-body">
              <p class="focus-log-note">
                No focused tasks yet today. Start a focus session to track one.
              </p>
            </div>
          </article>
        </div>

        <div class="focus-column focus-column-middle">
          <article class="sticky-note white tape focus-card focus-session-card">
            <div class="focus-session-heading">
              <button
                id="focusPiPToggleBtn"
                class="focus-pip-toggle"
                type="button"
                aria-label="Pop out focus timer"
                title="Pop out timer"
                aria-disabled="true"
              >
                <span
                  id="focusPiPIcon"
                  class="focus-pip-icon fa-solid fa-up-right-from-square"
                  aria-hidden="true"
                ></span>
              </button>
              <h2 class="focus-phase-title">Concentration Phase</h2>
            </div>
            <p id="focus-status" class="focus-status">
              Pick a task and start a focus session.
            </p>
            <div class="focus-session-center">
              <span id="focusTimer" class="focus-timer" aria-live="polite"
                >00:00</span
              >
            </div>
            <div class="focus-controls">
              <button id="focusStartBtn" class="paper-button" type="button">
                Start
              </button>
              <button
                id="focusStopBtn"
                class="paper-button"
                type="button"
                hidden
                disabled
              >
                Stop
              </button>
              <button
                id="focusCompleteBtn"
                class="paper-button"
                type="button"
                hidden
                disabled
              >
                Complete Task
              </button>
            </div>
          </article>
        </div>

        <div class="focus-column focus-column-right">
          <article class="sticky-note blue tape focus-card focus-task-card">
            <div class="paper-field">
              <label id="focusTaskLabel" for="focusTaskSelect"
                >What should we focus on right now?</label
              >
              <div
                class="focus-task-tabs"
                role="tablist"
                aria-label="Filter focus tasks"
              >
                <button
                  id="focusTabBigThree"
                  class="focus-task-tab is-active"
                  type="button"
                  role="tab"
                  aria-selected="true"
                  aria-controls="focusTaskList"
                  data-filter="big-three"
                >
                  Big 3
                </button>
                <button
                  id="focusTabTaskList"
                  class="focus-task-tab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="focusTaskList"
                  data-filter="task-list"
                >
                  Task List
                </button>
                <button
                  id="focusTabEffort"
                  class="focus-task-tab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="focusTaskList"
                  data-filter="effort"
                >
                  Effort
                </button>
              </div>
              <select
                id="focusTaskSelect"
                aria-label="Select a task to focus on"
                hidden
              ></select>
              <div
                class="handdrawn-divider focus-task-divider"
                aria-hidden="true"
              ></div>
              <ul
                id="focusTaskList"
                class="big-three-list focus-task-list"
                role="listbox"
                aria-labelledby="focusTaskLabel"
              ></ul>
            </div>
          </article>

          <article class="sticky-note pink tape focus-card focus-quote-card">
            <p
              id="focusQuoteText"
              class="focus-quote-text"
              aria-live="polite"
            ></p>
          </article>
        </div>
      </section>
    </main>

    <div
      id="toast"
      class="toast toast--default"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    >
      <div class="toast__icon" aria-hidden="true">i</div>
      <div class="toast__content">
        <div id="toastTitle" class="toast__title" hidden></div>
        <div id="toastMessage" class="toast__message"></div>
      </div>
      <button
        id="toastClose"
        class="toast__close"
        type="button"
        aria-label="Close notification"
      >
        ×
      </button>
      <div class="toast__progress"></div>
    </div>
  </body>
</html>
