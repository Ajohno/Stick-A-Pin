<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stick A Pin</title>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/image/donezo-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
  </head>
  <body class="cork-page forgot-password-page">
    <main id="forgot-password-page" class="sticky-note thumbtack">
      <div class="paper-content">
        <div class="paper-header">
          <h1>Forgot Password</h1>
          <p>Enter your email to receive a reset link.</p>
        </div>

        <form id="forgotPasswordForm" class="paper-form">
          <div class="paper-field">
            <label for="forgotPasswordEmail">Email</label>
            <input id="forgotPasswordEmail" type="email" name="email" placeholder="user@example.com" required />
          </div>
          <button class="paper-button" type="submit">Send Reset Link</button>
        </form>

        <p class="paper-footer"><a href="/login.html">Back to login</a></p>
      </div>
    </main>
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
