<!doctype html>
<html lang="en">
  <head>
    <title>Stick A Pin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/image/donezo-logo.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Itim&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button
          class="nav__toggle"
          type="button"
          aria-label="Open menu"
          aria-controls="nav-drawer"
          aria-expanded="false"
        >
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
          <span class="sr-only">Menu</span>
        </button>

        <a href="/dashboard.html" class="logo-container brand-link" aria-label="Go to dashboard">
          <div class="logo-sticky">
            <div class="thumbtack">
              <i class="fa-solid fa-thumbtack" style="color: #c6534e"></i>
            </div>
          </div>
          <span class="brand-name">Stick A Pin</span>
        </a>
      </div>

      <ul class="nav-links" id="nav-drawer">
        <li><a href="/dashboard.html" class="nav-item">Board</a></li>
        <li><a href="/calendar-page.html" class="nav-item">Calendar</a></li>
        <li><a href="/feedback-page.html" class="nav-item">Feedback</a></li>
        <li><a href="/settings-page.html" class="nav-item">Settings</a></li>
        <li><a href="#" id="logoutBtn" class="nav-item">Logout</a></li>
      </ul>

      <div class="nav-right">
        <div class="nav-status">
          <div class="nav-tasks">
            <span class="tasks-count item-counter"></span>
            <span class="tasks-label-text">Tasks Left</span>
          </div>
          <span id="authStatus" class="nav-welcome"></span>
        </div>
        <a
            href="/profile-page.html"
            class="nav-profile-button sticky-note thumbtack"
            aria-label="Open profile"
          >
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <span class="sr-only">Profile</span>
          </a>
      </div>
    </nav>
    <div id="nav-backdrop" aria-hidden="true"></div>

    <main class="corkboard profile-board" aria-label="Profile workspace">
      <aside class="profile-sidebar" aria-label="Profile navigation">
        <section class="sticky-note white thumbtack profile-user-card">
          <h2 id="profileSidebarUserName">User</h2>
          <p class="profile-user-subtitle">Productive Human</p>
        </section>

        <nav class="profile-side-nav" aria-label="Profile sections">
          <button class="profile-nav-link profile-panel-trigger is-active" type="button" data-panel="profile" aria-label="Show My Profile">
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            My Profile
          </button>
          <button class="profile-nav-link profile-panel-trigger" type="button" data-panel="settings" aria-label="Show Settings">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
            Settings
          </button>
          <button class="profile-nav-link profile-panel-trigger" type="button" data-panel="support" aria-label="Show Help and Support">
            <i class="fa-solid fa-circle-question" aria-hidden="true"></i>
            Help &amp; Support
          </button>
        </nav>

        <button id="profileSidebarLogoutBtn" class="profile-logout-btn" type="button">
          <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          Logout
        </button>
      </aside>

      <section
        id="profileContentPanel"
        class="sticky-note white caution-tape profile-content-panel"
        aria-live="polite"
      >
        <div class="profile-mobile-stamps" aria-label="Profile section quick actions">
          <button
            class="profile-stamp-link profile-panel-trigger is-active"
            type="button"
            data-panel="profile"
            aria-label="Show My Profile"
          >
            <i class="fa-solid fa-user" aria-hidden="true"></i>
          </button>
          <button
            class="profile-stamp-link profile-panel-trigger"
            type="button"
            data-panel="settings"
            aria-label="Show Settings"
          >
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
          </button>
          <button
            class="profile-stamp-link profile-panel-trigger"
            type="button"
            data-panel="support"
            aria-label="Show Help and Support"
          >
            <i class="fa-solid fa-circle-question" aria-hidden="true"></i>
          </button>
          <button
            id="profileMobileLogoutBtn"
            class="profile-stamp-link logout-stamp"
            type="button"
            aria-label="Logout"
          >
            <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          </button>
        </div>
        <div id="profilePanelContent"></div>
      </section>
    </main>

    <div
      id="toast"
      class="toast toast--default"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    >
      <div class="toast__icon" aria-hidden="true">i</div>
      <div class="toast__content">
        <div id="toastTitle" class="toast__title" hidden></div>
        <div id="toastMessage" class="toast__message"></div>
      </div>
      <button
        id="toastClose"
        class="toast__close"
        type="button"
        aria-label="Close notification"
      >
        ×
      </button>
      <div class="toast__progress"></div>
    </div>
  </body>
</html>
