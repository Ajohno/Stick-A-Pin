<!doctype html>
<html lang="en">
  <head>
    <title>Stick A Pin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="js/notification.js" defer></script>
    <script src="js/main.js" defer></script>
    <link rel="icon" type="image/png" href="/assets/image/donezo-logo.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/image/donezo-logo.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f5ecd7" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/stickies.css" />
    <link rel="stylesheet" href="css/notification.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Itim&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button
          class="nav__toggle"
          type="button"
          aria-label="Open menu"
          aria-controls="nav-drawer"
          aria-expanded="false"
        >
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
          <span class="sr-only">Menu</span>
        </button>
        <a href="/dashboard.html" class="logo-container brand-link" aria-label="Go to dashboard">
          <div class="logo-sticky">
            <div class="thumbtack">
              <i class="fa-solid fa-thumbtack" style="color: #c6534e"></i>
            </div>
          </div>
          <span class="brand-name">Stick A Pin</span>
        </a>
      </div>
      <ul class="nav-links" id="nav-drawer">
        <li><a href="/dashboard.html" class="nav-item">Board</a></li>
        <li><a href="/calendar-page.html" class="nav-item">Calendar</a></li>
      </ul>
      <div class="nav-right">
        <div class="nav-status">
          <div class="nav-tasks">
            <span class="tasks-count item-counter"></span>
            <span class="tasks-label-text">Tasks Left</span>
          </div>
          <span id="authStatus" class="nav-welcome"></span>
        </div>
        <a
            href="/profile-page.html"
            class="nav-profile-button sticky-note thumbtack"
            aria-label="Open profile"
          >
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <span class="sr-only">Profile</span>
          </a>
      </div>
    </nav>
    <div id="nav-backdrop" aria-hidden="true"></div>

    <main class="corkboard placeholder-board feedback-board">
      <section
        class="sticky-note orange caution-tape feedback-note"
        aria-label="Send feedback email form"
      >
        <h2 class="widget-title">
          <i class="fa-solid fa-comment-dots" style="color: #c6534e"></i>
          Feedback
        </h2>
        <p class="feedback-intro">
          Report bugs you run into while using Stick A Pin. We'll send your
          note straight to our support inbox.
        </p>
        <form id="feedbackForm" class="feedback-form" novalidate>
          <label for="feedbackEmail">Your account email</label>
          <input id="feedbackEmail" type="email" readonly />

          <label for="feedbackSubject">Bug summary</label>
          <input
            id="feedbackSubject"
            name="feedbackSubject"
            type="text"
            maxlength="120"
            placeholder="Short summary of the issue"
            required
          />

          <label for="feedbackMessage">What happened?</label>
          <div class="feedback-attachment-toolbar">
            <button
              id="feedbackPhotoBtn"
              class="feedback-photo-btn"
              type="button"
              aria-controls="feedbackPhotoInput feedbackAttachmentList"
            >
              <i class="fa-regular fa-image" aria-hidden="true"></i>
              Add photo
            </button>
            <span class="feedback-photo-hint"
              >Paste images into the details box or upload from your device.</span
            >
          </div>
          <input
            id="feedbackPhotoInput"
            name="feedbackPhotos"
            type="file"
            accept="image/*"
            multiple
            hidden
          />
          <textarea
            id="feedbackMessage"
            name="feedbackMessage"
            maxlength="2000"
            rows="6"
            placeholder="Steps to reproduce, expected result, and what you saw."
            required
          ></textarea>
          <ul
            id="feedbackAttachmentList"
            class="feedback-attachment-list"
            aria-live="polite"
          ></ul>

          <button id="feedbackSubmitBtn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <div
      id="toast"
      class="toast toast--default"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    >
      <div class="toast__icon" aria-hidden="true">i</div>
      <div class="toast__content">
        <div id="toastTitle" class="toast__title" hidden></div>
        <div id="toastMessage" class="toast__message"></div>
      </div>
      <button
        id="toastClose"
        class="toast__close"
        type="button"
        aria-label="Close notification"
      >
        ×
      </button>
      <div class="toast__progress"></div>
    </div>
  </body>
</html>
